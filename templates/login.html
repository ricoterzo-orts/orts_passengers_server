<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso — ORTS Passengers</title>
<style>
:root {
    --accent: #CE1B26;
    --font: 'Futura', 'Trebuchet MS', sans-serif;
}
body, html { height: 100%; margin: 0; font-family: var(--font); }

/* SFONDO CON IMMAGINE */
.bg-image {
    background-image: url('/static/train-bg.jpg'); /* Carica un'immagine in static/train-bg.jpg */
    background-size: cover;
    background-position: center;
    height: 100%; width: 100%;
    position: fixed; z-index: -1;
    filter: brightness(0.5);
}

.login-container {
    height: 100%; display: flex; align-items: center; justify-content: center;
}

.login-box {
    background: white; padding: 40px; border-radius: 4px;
    width: 100%; max-width: 360px; text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.logo { max-width: 140px; margin-bottom: 25px; }
h2 { font-size: 18px; margin-bottom: 25px; color: #333; text-transform: uppercase; letter-spacing: 1px; }

.field { text-align: left; margin-bottom: 15px; }
.field label { display: block; font-size: 10px; font-weight: bold; color: #777; margin-bottom: 5px; text-transform: uppercase; }
.field input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 2px; box-sizing: border-box; font-size: 14px; }

.login-btn {
    width: 100%; padding: 14px; background: var(--accent); color: white;
    border: none; font-weight: bold; cursor: pointer; border-radius: 2px;
    text-transform: uppercase; margin-top: 10px;
}

.login-btn:hover { background: #A8141D; }

.msg { margin-top: 15px; font-size: 13px; min-height: 20px; }
.err { color: #CE1B26; }

.footer { margin-top: 20px; font-size: 12px; color: #888; }
.footer a { color: var(--accent); text-decoration: none; font-weight: bold; }
</style>
</head>
<body>

<div class="bg-image"></div>

<div class="login-container">
    <div class="login-box">
        <img src="/static/VTV_logo.jpg" alt="Logo" class="logo">
        <h2>Area Riservata</h2>
        
        <div class="field">
            <label>Username o Email</label>
            <input type="text" id="user" placeholder="Inserisci username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        
        <button class="login-btn" onclick="doLogin()">Entra</button>
        <div id="msg" class="msg"></div>
        
        <div class="footer">
            Non hai un account? <a href="#" onclick="alert('Contatta l\'amministratore per la registrazione')">Registrati</a>
        </div>
    </div>
</div>

<script>
async function doLogin() {
    const msg = document.getElementById('msg');
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    if(!u || !p) return;

    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const d = await r.json();
        if(d.ok) {
            window.location.href = '/';
        } else {
            msg.textContent = '✗ ' + d.error;
            msg.className = 'msg err';
        }
    } catch(e) {
        msg.textContent = "Errore di connessione";
    }
}

// Permetti invio con tasto Enter
document.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
